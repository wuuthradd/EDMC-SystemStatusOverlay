name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          mkdir -p dist package/EDMC-SystemStatusOverlay
          cp load.py package/EDMC-SystemStatusOverlay/
          cp version.py package/EDMC-SystemStatusOverlay/
          cp -r scanner_plugin package/EDMC-SystemStatusOverlay/
          cd package
          zip -r ../dist/EDMC-SystemStatusOverlay-${{ github.ref_name }}.zip EDMC-SystemStatusOverlay

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
